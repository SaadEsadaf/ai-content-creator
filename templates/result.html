<!DOCTYPE html>
<html>
<head>
    <title>AI Content Creator - Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <h1 class="mb-2">✅ Content Generated!</h1>
                <p class="text-muted mb-4">Topic: <strong>{{ topic }}</strong></p>
                <div class="card bg-secondary p-4 mb-4">
                    {{ content|safe }}
                </div>
                <a href="/" class="btn btn-primary">🔄 Generate New Content</a>
            </div>
        </div>
    </div>
</body>
</html>
