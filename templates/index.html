<!DOCTYPE html>
<html>
<head>
    <title>AI Content Creator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="mb-2">🤖 AI Content Creator</h1>
                <p class="text-muted mb-4">Generate blog posts & social media content instantly</p>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <div class="card bg-secondary p-4">
                    <form action="/generate" method="POST">
                        <input type="text" name="topic" class="form-control form-control-lg mb-3" placeholder="Enter your topic e.g. Benefits of AI for small business" required>
                        <button type="submit" class="btn btn-primary btn-lg w-100">✨ Generate Content</button>
                    </form>
                </div>
                <p class="text-muted mt-3">⏳ Generation takes 2-3 minutes</p>
            </div>
        </div>
    </div>
</body>
</html>
